<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css e js/style.css">
    <script src="./css e js/script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div class="centralizador">
        <div class="fundo">
        <h1>Teste sua sorte</h1>
        <p>Jogue um numero e sorteie 8 numeros, a soma de 2 desses 8 numeros tem que resultar no seu alvo, pode jogar o mesmo numero ou outro numero. Após concluir, Clique em limpar e teste novamente!
        </p>

        <div class="botao-center">
        <input type="number" id="inputAlvo" min="1" max="10">
        <button type="button" id="sorting">Sortear 8 numeros</button>
        <button id="limpar">Limpar</button>
        <div id="saidaDados"></div>
        </div>
        </div>
    </div>
</body>
</html>
